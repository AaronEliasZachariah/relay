# Render blueprint — one-click deploy of the Relay backend + a managed Postgres.
# In Render: New → Blueprint → point at this repo. Then set the `sync: false`
# secrets (Twilio / AI / WhatsApp / RevenueCat) in the dashboard when ready.
services:
  - type: web
    name: relay-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    preDeployCommand: npm run db:migrate # apply migrations before each deploy
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: relay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Secrets — set these in the Render dashboard to go from mock → live.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: REVENUECAT_AUTH_HEADER
        sync: false

databases:
  - name: relay-db
    plan: free
