# Local Postgres for development: `docker compose up -d`
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - relay_pg:/var/lib/postgresql/data

volumes:
  relay_pg:
